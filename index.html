<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ניהול חובות ועבודה</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial, sans-serif; background:#f4f4f4; padding:10px; margin:0; }
h1 { text-align:center; margin-bottom:10px; }
section { background:#fff; padding:15px; border-radius:5px; margin-bottom:15px; }
input, select, button { margin-left:5px; margin-bottom:5px; }
#workCalendar { display:grid; grid-template-columns:repeat(auto-fill,minmax(90px,1fr)); gap:5px; }
.dayCell { background:#eee; padding:5px; border-radius:5px; min-height:80px; display:flex; flex-direction:column; font-size:12px; }
.dayCell header { font-weight:bold; margin-bottom:3px; }
.dashboard { background:#fff; padding:15px; border-radius:5px; margin-top:10px; }
canvas { background:#fff; border-radius:5px; margin-top:10px; max-width:100%; }
button { cursor:pointer; }
</style>
</head>
<body>
<h1>ניהול חובות ועבודה</h1>

<section>
<h2>חיסכון וחובות</h2>
<label>חיסכון חודשי ₪: <input type="number" id="monthlySavings" value="500"></label>
<div id="debtsContainer"></div>
<button onclick="addDebt()">הוסף חוב</button>
</section>

<section>
<h2>לוח עבודה חודשי</h2>
<div id="calendarControls">
<button onclick="prevMonth()">&lt; קודם</button>
<span id="monthYear"></span>
<button onclick="nextMonth()">הבא &gt;</button>
</div>
<div id="workCalendar"></div>
</section>

<section class="dashboard">
<h2>דשבורד</h2>
<p>סה"כ הכנסות עבודה: <span id="totalEarnings">0</span> ₪</p>
<p>סה"כ חיסכון: <span id="totalSavings">0</span> ₪</p>
<p>סה"כ תשלום חובות: <span id="totalDebtPaid">0</span> ₪</p>
<p>חוב שנותר: <span id="remainingDebt">0</span> ₪</p>
<div id="monthsLeftContainer"></div>
<canvas id="debtChart" width="400" height="200"></canvas>
<canvas id="earningsChart" width="400" height="200"></canvas>
</section>

<script>
// הקוד שלך נשאר בדיוק כמו ששלחתי לך קודם
// לשם קיצור, זה לא מופיע כאן שוב אבל אתה משתמש בקוד הזה בדיוק
</script>
</body>
</html>
